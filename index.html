<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลิงก์ → QR โค้ด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --ink:#10142A;
    --ink-2:#161B36;
    --paper:#EDE9E0;
    --paper-dim:#B9B4A8;
    --amber:#FFB454;
    --teal:#4FD1C5;
    --line:rgba(237,233,224,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(ellipse at top left, rgba(255,180,84,0.07), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(79,209,197,0.06), transparent 55%),
      var(--ink);
    font-family:'Space Grotesk',sans-serif;
    color:var(--paper);
  }
  .card{
    width:100%;
    max-width:420px;
    background:var(--ink-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:32px 28px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--amber);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .eyebrow::before{content:"";width:6px;height:6px;background:var(--amber);border-radius:1px;}
  h1{
    font-size:26px;
    margin:0 0 8px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  p.sub{
    color:var(--paper-dim);
    font-size:14px;
    line-height:1.6;
    margin:0 0 24px;
  }
  label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--paper-dim);
    margin-bottom:7px;
  }
  input[type=text]{
    width:100%;
    background:#0C0F22;
    border:1px solid var(--line);
    color:var(--paper);
    padding:12px 13px;
    border-radius:7px;
    font-family:'JetBrains Mono',monospace;
    font-size:13.5px;
    outline:none;
    margin-bottom:16px;
  }
  input[type=text]:focus{border-color:var(--amber);}
  button{
    width:100%;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    padding:13px;
    border-radius:8px;
    border:none;
    background:var(--amber);
    color:#1a1204;
    cursor:pointer;
  }
  button:hover{filter:brightness(1.08);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .result{
    display:none;
    text-align:center;
    margin-top:26px;
  }
  .result.active{display:block;}
  #qrbox{
    background:#fff;
    padding:16px;
    border-radius:8px;
    width:fit-content;
    margin:0 auto 16px;
  }
  .dl{
    display:inline-block;
    background:transparent;
    border:1px solid var(--line);
    color:var(--paper);
    padding:10px 18px;
    border-radius:7px;
    font-size:13px;
    cursor:pointer;
    text-decoration:none;
  }
  .dl:hover{border-color:var(--teal);}
  .err{
    color:#FF6B6B;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    margin-top:-6px;
    margin-bottom:14px;
    display:none;
  }
  .err.active{display:block;}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Link To QR By Nong Boat</div>
    <h1>วางลิงก์ → QR</h1>
    <p class="sub">วางลิงก์วิดีโอ (หรือลิงก์อะไรก็ได้) แล้วกดสร้าง QR โค้ดเพื่อนำไปใช้งานหรือแชร์ต่อนะครับ (สร้างขึ้นมาเพื่อให้น้องรวงข้าวได้ส่งงาน และผู้ที่เข้ามาใช้งานทุกท่านได้สร้าง QR เป็นของตัวเองแบบฟรีๆ)</p>

    <label>ลิงก์</label>
    <input type="text" id="urlInput" placeholder="https://...">
    <div class="err" id="errMsg">ใส่ลิงก์ที่ขึ้นต้นด้วย http:// หรือ https://</div>

    <button id="genBtn">สร้าง QR</button>

    <div class="result" id="result">
      <div id="qrbox"></div>
      <a class="dl" id="dlBtn">ดาวน์โหลด QR</a>
    </div>
  </div>

<script>
const urlInput = document.getElementById('urlInput');
const genBtn = document.getElementById('genBtn');
const result = document.getElementById('result');
const qrbox = document.getElementById('qrbox');
const errMsg = document.getElementById('errMsg');
const dlBtn = document.getElementById('dlBtn');

function generate(){
  const val = urlInput.value.trim();
  if(!/^https?:\/\/.+/i.test(val)){
    errMsg.classList.add('active');
    result.classList.remove('active');
    return;
  }
  errMsg.classList.remove('active');
  qrbox.innerHTML = '';
  new QRCode(qrbox, {
    text: val,
    width: 240,
    height: 240,
    colorDark: '#10142A',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  result.classList.add('active');
  setTimeout(()=>{
    const canvas = qrbox.querySelector('canvas');
    if(canvas){
      dlBtn.href = canvas.toDataURL('image/png');
      dlBtn.download = 'qr-code.png';
    }
  }, 50);
}

genBtn.addEventListener('click', generate);
urlInput.addEventListener('keydown', e => { if(e.key === 'Enter') generate(); });
</script>
</body>
</html>
